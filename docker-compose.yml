services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao-quatro5-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - gestao_postgres_data:/var/lib/postgresql/data

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: gestao-quatro5-keycloak-db
    restart: always
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    volumes:
      - gestao_keycloak_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: bitnamilegacy/keycloak:latest
    container_name: gestao-quatro5-keycloak
    restart: always
    depends_on:
      - keycloak-postgres
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_PRODUCTION: "false"
      KEYCLOAK_ENABLE_HTTPS: "false"
      KEYCLOAK_DATABASE_HOST: keycloak-postgres
      KEYCLOAK_DATABASE_PORT: "5432"
      KEYCLOAK_DATABASE_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DATABASE_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DATABASE_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_EXTRA_ARGS: "--import-realm"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./quatro5-realm.json:/opt/bitnami/keycloak/data/import/quatro5-realm.json

volumes:
  gestao_postgres_data:
  gestao_keycloak_postgres_data:
